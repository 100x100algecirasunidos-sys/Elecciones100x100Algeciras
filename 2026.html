    const stats = {"n_total": 87, "n_sin": 2, "v_total": 0, "esc_total": 51303, "pct_total": 0.0, "party_name": "100x100", "max_v": 0, "bounds": {"minlo": -5.5511, "maxlo": -5.42463, "minla": 36.05019, "maxla": 36.17549}};
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    if(stats.bounds) map.fitBounds([[stats.bounds.minla, stats.bounds.minlo],[stats.bounds.maxla, stats.bounds.maxlo]]);
    else map.setView([36.13, -5.45], 13);

    let layer;
    function gColor(p) {
        return p > 30 ? '#084594' : p > 20 ? '#2171b5' : p > 10 ? '#4292c6' : p > 5 ? '#6baed6' : p > 0 ? '#9ecae1' : '#eff3ff';
    }

    function update() {
        if(layer) map.removeLayer(layer);
        const dist = document.getElementById('df').value;
        const minV = parseInt(document.getElementById('vr').value);
        document.getElementById('vv').innerText = minV;

        const filtered = data.features.filter(f => {
            const p = f.properties;
            return (dist === 'all' || p.CDIS == dist) && p.v_100 >= minV;
        });

        layer = L.geoJson({type:'FeatureCollection', features:filtered}, {
            style: f => {
                const p = f.properties;
                return p.has_data ? {fillColor:gColor(p.pct_100), weight:1.5, color:'#333', fillOpacity:0.85} 
                                 : {fillColor:'#777', weight:1, color:'#333', fillOpacity:0.4};
            },
            onEachFeature: (f, l) => {
                const p = f.properties;
                l.bindPopup('<b>SC '+p.CUSEC+'</b><br>Distrito '+p.CDIS+' / Secc '+p.CSEC+'<br>Votos 100x100: '+p.v_100+'<br>% 100x100: '+p.pct_100+'%<br>Escrutinio: '+p.esc_v+'<br>Ganador: '+p.winner+' ('+p.wp+'%)<br>Part.: '+p.pa+'%');
            }
        }).addTo(map);

        let table = '<h4>Top 15 Secciones</h4><table><tr><th>SC</th><th>Votos</th><th>%</th></tr>';
        filtered.filter(f=>f.properties.has_data).sort((a,b)=>b.properties.v_100 - a.properties.v_100).slice(0,15).forEach(f=>{
            const p = f.properties; table += '<tr><td>'+p.CDIS+'-'+p.CSEC+'</td><td>'+p.v_100+'</td><td>'+p.pct_100+'%</td></tr>';
        });
        document.getElementById('rank').innerHTML = table + '</table>';
    }

    const dists = [...new Set(data.features.map(f=>f.properties.CDIS))].sort();
    dists.forEach(d => { const o = document.createElement('option'); o.value=d; o.text='Distrito '+d; document.getElementById('df').add(o); });
    document.getElementById('df').onchange = update;
    document.getElementById('vr').oninput = update;
    update();

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = () => {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<b>% 100x100</b><br><i style="background:#084594"></i> >30%<br><i style="background:#2171b5"></i> 20-30%<br><i style="background:#4292c6"></i> 10-20%<br><i style="background:#6baed6"></i> 5-10%<br><i style="background:#9ecae1"></i> 1-5%<br><i style="background:#eff3ff"></i> <1%<br><i style="background:#777"></i> Sin datos';
        return div;
    };
    legend.addTo(map);
</script>
